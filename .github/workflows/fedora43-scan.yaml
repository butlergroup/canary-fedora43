name: fedora43 Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            openssh-client \
            netcat-openbsd \
            ca-certificates

      - name: Download image
        run: |
          curl -L --retry 5 -o fedora43.img \
            https://insect.mm.fcix.net/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2

      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f id_rsa -N ""

      - name: Create cloud-init config
        run: |
          cat > user-data <<EOF
          #cloud-config
          users:
            - name: clouduser
              sudo: ALL=(ALL) NOPASSWD:ALL
              groups: wheel
              shell: /bin/bash
              ssh_authorized_keys:
                - $(cat id_rsa.pub)
          ssh_pwauth: false
          disable_root: true
          EOF

          cloud-localds seed.iso user-data

      - name: Start fedora43 VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -machine type=q35,accel=tcg \
            -cpu max \
            -drive file=fedora43.img,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -boot c \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Wait for SSH to be fully ready
        run: |
          for i in {1..120}; do
            if ssh -i id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              -o BatchMode=yes \
              -p 2222 clouduser@localhost "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH is fully ready"
              exit 0
            fi
            echo "⏳ Waiting for SSH..."
            sleep 2
          done
          echo "❌ SSH failed to become ready"
          exit 1

      - name: Dump VM logs
        if: failure()
        run: cat vm.log || true

      - name: Generate SBOM inside VM
        run: |
          ssh -i id_rsa -p 2222 clouduser@localhost <<'EOF'
          set -e

          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

          # Generate SBOM (CycloneDX format is well-supported)
          sudo ./bin/trivy rootfs / \
            --format cyclonedx \
            --scanners vuln \
            --output /tmp/sbom.json
          EOF

      - name: Copy SBOM from VM
        run: |
          scp -i id_rsa -P 2222 \
            -o StrictHostKeyChecking=no \
            clouduser@localhost:/tmp/sbom.json \
            sbom.json

      - name: Install Trivy on runner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - name: Scan SBOM with Trivy
        run: |
          ./bin/trivy sbom sbom.json \
            --scanners vuln \
            -f sarif \
            -o report.sarif

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: report.sarif
